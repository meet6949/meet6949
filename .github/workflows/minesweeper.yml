name: Minesweeper

on:
  issues:
    types: [opened]

jobs:
  play:
    runs-on: ubuntu-latest
    if: startsWith(github.event.issue.title, 'Minesweeper:')
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Process Move
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: python3 scripts/minesweeper.py
      - name: Commit changes
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add .
          git commit -m "Minesweeper: ${{ github.event.issue.title }}" || exit 0
          git push
      - name: Close Issue
        uses: peter-evans/close-issue@v2
        with:
          issue-number: ${{ github.event.issue.number }}
          comment: "Move processed! Check the README for the updated board."
