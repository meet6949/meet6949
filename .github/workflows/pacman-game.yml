name: Generate Pac-Man contribution graph

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Generate Pac-Man graph
        uses: Platane/snk@v3
        with:
          github_user_name: meet6949
          outputs: |
            pacman-contribution-graph.svg?palette=github-dark&color_snake=#ef4444

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: .
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
