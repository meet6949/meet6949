name: Generate Space Contribution Game

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Generate Space Game SVG
        run: |
          mkdir -p dist
          cat > dist/space-game.svg << 'EOF'
          <svg width="800" height="200" xmlns="http://www.w3.org/2000/svg">

            <style>
              .ship { fill: #38BDF8; }
              .enemy { fill: #7C3AED; }
              .bullet { fill: #22C55E; }
              .text { fill: white; font-size: 14px; }
              .bg { fill: #0F172A; }
            </style>

            <rect width="100%" height="100%" class="bg"/>

            <!-- Player Ship -->
            <polygon class="ship" points="390,170 410,170 400,150">
              <animateTransform 
                attributeName="transform"
                type="translate"
                values="-50 0; 50 0; -50 0"
                dur="4s"
                repeatCount="indefinite"/>
            </polygon>

            <!-- Enemies -->
            <circle class="enemy" cx="100" cy="40" r="8">
              <animate attributeName="cy" values="40;140;40" dur="6s" repeatCount="indefinite"/>
            </circle>

            <circle class="enemy" cx="300" cy="60" r="8">
              <animate attributeName="cy" values="60;140;60" dur="5s" repeatCount="indefinite"/>
            </circle>

            <circle class="enemy" cx="600" cy="50" r="8">
              <animate attributeName="cy" values="50;140;50" dur="7s" repeatCount="indefinite"/>
            </circle>

            <!-- Bullets -->
            <rect class="bullet" x="398" y="140" width="4" height="10">
              <animate attributeName="y" values="140;20" dur="1s" repeatCount="indefinite"/>
            </rect>

            <text x="10" y="190" class="text">🚀 Defending commits like a boss</text>

          </svg>
          EOF

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
