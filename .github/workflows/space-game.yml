name: Generate Commit Activity Graph

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Generate Commit Graph SVG
        run: |
          mkdir -p dist

          # Fake sample data (you can later replace with API)
          VALUES=(5 8 3 10 6 12 4 9 7 11 2 6 8 5)

          echo '<svg width="900" height="300" xmlns="http://www.w3.org/2000/svg">' > dist/commit-graph.svg
          echo '<rect width="100%" height="100%" fill="#0F172A"/>' >> dist/commit-graph.svg

          X=50

          for VALUE in "${VALUES[@]}"
          do
            HEIGHT=$((VALUE * 10))
            Y=$((250 - HEIGHT))

            echo "<rect x=\"$X\" y=\"250\" width=\"20\" height=\"0\" fill=\"#38BDF8\">" >> dist/commit-graph.svg
            echo "<animate attributeName=\"height\" from=\"0\" to=\"$HEIGHT\" dur=\"1s\" fill=\"freeze\" />" >> dist/commit-graph.svg
            echo "<animate attributeName=\"y\" from=\"250\" to=\"$Y\" dur=\"1s\" fill=\"freeze\" />" >> dist/commit-graph.svg
            echo "</rect>" >> dist/commit-graph.svg

            X=$((X + 40))
          done

          echo '<text x="20" y="280" fill="white">📊 Commit activity loading...</text>' >> dist/commit-graph.svg
          echo '</svg>' >> dist/commit-graph.svg

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
