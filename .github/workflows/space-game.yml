name: Generate Space Contribution Game

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Generate Space Game SVG
        run: |
          mkdir -p dist
          cat > dist/space-game.svg << 'EOF'
          <svg width="900" height="220" xmlns="http://www.w3.org/2000/svg">

            <style>
              .ship { fill: #38BDF8; }
              .enemy { fill: #7C3AED; }
              .bullet { fill: #22C55E; }
              .text { fill: white; font-size: 14px; }
              .bg { fill: #0F172A; }
            </style>

            <rect width="100%" height="100%" class="bg"/>

            <!-- Player Ship -->
            <polygon class="ship" points="440,190 460,190 450,160">
              <animateTransform 
                attributeName="transform"
                type="translate"
                values="-60 0; 60 0; -60 0"
                dur="4s"
                repeatCount="indefinite"/>
            </polygon>

            <!-- Enemies -->
            <circle class="enemy" cx="100" cy="40" r="10">
              <animate attributeName="cy" values="40;160;40" dur="6s" repeatCount="indefinite"/>
            </circle>

            <circle class="enemy" cx="350" cy="60" r="10">
              <animate attributeName="cy" values="60;160;60" dur="5s" repeatCount="indefinite"/>
            </circle>

            <circle class="enemy" cx="700" cy="50" r="10">
              <animate attributeName="cy" values="50;160;50" dur="7s" repeatCount="indefinite"/>
            </circle>

            <!-- Bullets -->
            <rect class="bullet" x="448" y="150" width="4" height="12">
              <animate attributeName="y" values="150;20" dur="1s" repeatCount="indefinite"/>
            </rect>

            <text x="20" y="205" class="text">
              🚀 meet6949 defending commits in space
            </text>

          </svg>
          EOF

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
