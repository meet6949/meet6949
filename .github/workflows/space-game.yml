name: Generate Neural Network Animation

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Generate Neural Network SVG
        run: |
          mkdir -p dist
          cat > dist/neural-network.svg << 'EOF'
          <svg width="900" height="300" xmlns="http://www.w3.org/2000/svg">

            <style>
              .bg { fill: #0F172A; }
              .node { fill: #38BDF8; }
              .line { stroke: #1E3A8A; stroke-width: 2; opacity: 0.4; }
              .signal { fill: #22C55E; }
              .text { fill: white; font-size: 14px; }
            </style>

            <rect width="100%" height="100%" class="bg"/>

            <!-- Connections -->
            <line class="line" x1="150" y1="80" x2="450" y2="150"/>
            <line class="line" x1="150" y1="200" x2="450" y2="150"/>
            <line class="line" x1="450" y1="150" x2="750" y2="100"/>
            <line class="line" x1="450" y1="150" x2="750" y2="220"/>

            <!-- Nodes -->
            <circle class="node" cx="150" cy="80" r="12"/>
            <circle class="node" cx="150" cy="200" r="12"/>
            <circle class="node" cx="450" cy="150" r="14"/>
            <circle class="node" cx="750" cy="100" r="12"/>
            <circle class="node" cx="750" cy="220" r="12"/>

            <!-- Moving Signals -->
            <circle class="signal" r="5">
              <animateMotion dur="3s" repeatCount="indefinite">
                <mpath href="#path1"/>
              </animateMotion>
            </circle>

            <circle class="signal" r="5">
              <animateMotion dur="2.5s" repeatCount="indefinite">
                <mpath href="#path2"/>
              </animateMotion>
            </circle>

            <!-- Hidden Paths -->
            <path id="path1" d="M150 80 Q300 120 450 150 T750 100" fill="none"/>
            <path id="path2" d="M150 200 Q300 180 450 150 T750 220" fill="none"/>

            <text x="20" y="280" class="text">
              🧠 Training models... turning data into intelligence
            </text>

          </svg>
          EOF

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
