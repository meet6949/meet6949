name: Boat Animation

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4   # UPDATED

      - name: Generate SVG
        run: |
          mkdir -p dist
          cat > dist/boat.svg << 'EOF'
          <svg width="800" height="250" xmlns="http://www.w3.org/2000/svg">
            <rect width="100%" height="100%" fill="#0F172A"/>

            <path d="M0 180 Q100 160 200 180 T400 180 T600 180 T800 180" stroke="#38BDF8" fill="none">
              <animateTransform attributeName="transform" type="translate"
                values="0 0; -200 0" dur="4s" repeatCount="indefinite"/>
            </path>

            <g>
              <polygon points="350,170 420,170 400,190 370,190" fill="#F59E0B"/>
              <line x1="385" y1="170" x2="385" y2="130" stroke="white"/>
              <polygon points="385,130 385,170 420,150" fill="white"/>

              <animateTransform attributeName="transform" type="translate"
                values="-80 0; 80 0; -80 0"
                dur="6s" repeatCount="indefinite"/>

              <animateTransform attributeName="transform" type="translate"
                values="0 0; 0 -10; 0 0"
                dur="3s" additive="sum"
                repeatCount="indefinite"/>
            </g>
          </svg>
          EOF

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4   # UPDATED ACTION
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: output
          publish_dir: ./dist












