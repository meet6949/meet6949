name: Generate Heatmap with Streak

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - name: Install jq
        run: sudo apt-get install jq

      - name: Fetch GitHub Contributions
        run: |
          curl -X POST https://api.github.com/graphql \
          -H "Authorization: bearer ${{ secrets.GITHUB_TOKEN }}" \
          -H "Content-Type: application/json" \
          -d '{
            "query": "{
              user(login: \"meet6949\") {
                contributionsCollection {
                  contributionCalendar {
                    weeks {
                      contributionDays {
                        contributionCount
                      }
                    }
                  }
                }
              }
            }"
          }' > data.json

      - name: Generate Heatmap SVG
        run: |
          mkdir -p dist

          echo '<svg width="900" height="200" xmlns="http://www.w3.org/2000/svg">' > dist/heatmap.svg
          echo '<rect width="100%" height="100%" fill="#0F172A"/>' >> dist/heatmap.svg

          SIZE=10
          GAP=3
          X=20

          VALUES=$(cat data.json | jq -r '.data.user.contributionsCollection.contributionCalendar.weeks[].contributionDays[].contributionCount')

          i=0
          STREAK=0
          MAX_STREAK=0

          for VALUE in $VALUES
          do
            ROW=$((i % 7))
            COL=$((i / 7))

            XPOS=$((20 + COL * (SIZE + GAP)))
            YPOS=$((20 + ROW * (SIZE + GAP)))

            # Color logic
            if [ "$VALUE" -eq 0 ]; then COLOR="#1E293B"
            elif [ "$VALUE" -lt 3 ]; then COLOR="#0EA5E9"
            elif [ "$VALUE" -lt 6 ]; then COLOR="#22C55E"
            elif [ "$VALUE" -lt 10 ]; then COLOR="#84CC16"
            else COLOR="#EAB308"
            fi

            echo "<rect x=\"$XPOS\" y=\"$YPOS\" width=\"$SIZE\" height=\"$SIZE\" fill=\"$COLOR\">" >> dist/heatmap.svg
            echo "<animate attributeName=\"opacity\" from=\"0\" to=\"1\" dur=\"0.3s\" begin=\"${i}ms\" fill=\"freeze\" />" >> dist/heatmap.svg
            echo "</rect>" >> dist/heatmap.svg

            # Streak logic
            if [ "$VALUE" -gt 0 ]; then
              STREAK=$((STREAK + 1))
              if [ "$STREAK" -gt "$MAX_STREAK" ]; then
                MAX_STREAK=$STREAK
              fi
            else
              STREAK=0
            fi

            i=$((i + 1))
          done

          echo "<text x=\"20\" y=\"140\" fill=\"white\">🔥 Max Streak: $MAX_STREAK days</text>" >> dist/heatmap.svg
          echo "<text x=\"20\" y=\"170\" fill=\"white\">⚡ Auto-updated from real commits</text>" >> dist/heatmap.svg

          echo '</svg>' >> dist/heatmap.svg

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
