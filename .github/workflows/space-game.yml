name: Generate Space Game

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true


jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
          

      - name: Install deps
        run: pip install requests

      - name: Run script
        run: python scripts/generate_svg.py

      - name: Push
        run: |
          git config user.name "meet6949"
          git config user.email "meet6949@users.noreply.github.com"
          git add output/game.svg
          git commit -m "update svg" || echo "no changes"
          git push
