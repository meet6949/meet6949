name: Space Game Animation

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Generate Contribution Snake Base
        uses: Platane/snk@v3
        with:
          github_user_name: meet6949
          outputs: |
            output/base.svg

      - name: Add Spaceship + Effects
        run: |
          mkdir -p output

          cat << 'EOF' > output/game.svg
          <svg viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">

          <!-- Background -->
          <rect width="100%" height="100%" fill="#0d1117"/>

          <!-- Import Contributions -->
          <image href="./base.svg" x="0" y="0" width="900" height="200"/>

          <!-- Spaceship -->
          <g>
            <polygon points="0,10 20,0 40,10 20,20" fill="#00f5ff">
              <animateTransform attributeName="transform"
                type="translate"
                from="0 150"
                to="750 150"
                dur="6s"
                fill="freeze"/>
            </polygon>
          </g>

          <!-- Bullet -->
          <line x1="750" y1="160" x2="850" y2="160" stroke="red" stroke-width="2">
            <animate attributeName="x1" from="750" to="850" dur="0.5s" begin="6s" repeatCount="3"/>
            <animate attributeName="x2" from="750" to="900" dur="0.5s" begin="6s" repeatCount="3"/>
          </line>

          <!-- Blast Effect -->
          <circle cx="850" cy="160" r="5" fill="orange">
            <animate attributeName="r" from="5" to="25" dur="0.4s" begin="6.2s"/>
            <animate attributeName="opacity" from="1" to="0" dur="0.4s" begin="6.2s"/>
          </circle>

          </svg>
          EOF

      - name: Commit & Push
        run: |
          git config user.name "meet6949"
          git config user.email "meet6949@users.noreply.github.com"
          git add output/game.svg
          git commit -m "Update space game animation"
          git push








