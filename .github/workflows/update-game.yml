name: Move Player

on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - run: |
          POS=$(( (RANDOM % 400) + 50 ))
          echo "<svg width='500' height='100' xmlns='http://www.w3.org/2000/svg'>
          <rect width='500' height='100' fill='#0d1117'/>
          <line x1='10' y1='50' x2='490' y2='50' stroke='white' stroke-width='2'/>
          <circle cx='$POS' cy='50' r='8' fill='lime'/>
          </svg>" > game.svg

      - run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add game.svg
          git commit -m "move player" || echo "no change"
          git push
