      <animate attributeName="width" values="0;206" dur="1.4s" begin="0.25s" fill="freeze"/>
    </rect>

    <text x="24" y="118">scikit-learn</text>
    <rect x="150" y="108" width="246" height="8" rx="4" fill="#132540"/>
