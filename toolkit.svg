  </defs>
  <rect x="1" y="1" width="418" height="188" rx="14" fill="#0a0e1a" stroke="#1e3a5f"/>
  <text x="24" y="34" font-family="'Segoe UI',sans-serif" font-size="17" font-weight="700" fill="#38bdf8">Core Toolkit</text>

  <g font-family="'JetBrains Mono',monospace" font-size="12.5" fill="#c9d6ea">
