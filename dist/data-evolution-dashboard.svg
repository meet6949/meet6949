<svg width="480" height="200" viewBox="0 0 480 200" fill="none" xmlns="http://www.w3.org/2000/svg">
    <style>
        .header { font: bold 14px 'Courier New', monospace; fill: #38bdf8; }
        .stat-label { font: 12px 'Courier New', monospace; fill: #c9d1d9; }
        .stat-value { font: bold 12px 'Courier New', monospace; fill: #38bdf8; }
        .log-text { font: 10px 'Courier New', monospace; fill: #8b949e; }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        .cursor { animation: blink 1s infinite; fill: #38bdf8; }

        @keyframes progress {
            0% { width: 0%; }
            100% { width: 0%; }
        }
        .progress-bar { animation: progress 2s ease-out forwards; }

        @keyframes scanline {
            0% { transform: translateY(0); }
            100% { transform: translateY(200px); }
        }
        .scanline {
            width: 100%;
            height: 2px;
            background: linear-gradient(to bottom, transparent, rgba(56, 189, 248, 0.1), transparent);
            animation: scanline 4s linear infinite;
            position: absolute;
        }
    </style>

    <rect width="480" height="200" rx="10" fill="#0d1117" stroke="#30363d" stroke-width="2"/>

    <!-- Header -->
    <text x="20" y="30" class="header">INITIALIZING NEURAL_NETWORK.EXE...</text>
    <rect x="20" y="40" width="440" height="1" fill="#30363d"/>

    <!-- Training Stats -->
    <text x="20" y="65" class="stat-label">EPOCH:</text>
    <text x="120" y="65" class="stat-value">16/1000</text>

    <text x="20" y="85" class="stat-label">LOSS:</text>
    <text x="120" y="85" class="stat-value">0.3500</text>

    <text x="200" y="85" class="stat-label">ACCURACY:</text>
    <text x="300" y="85" class="stat-value">95.50%</text>

    <!-- Progress Bar Label -->
    <text x="20" y="115" class="stat-label">CURRENT BATCH PROGRESS:</text>

    <!-- Progress Bar -->
    <rect x="20" y="125" width="440" height="15" rx="3" fill="#161b22" stroke="#30363d"/>
    <rect class="progress-bar" x="20" y="125" height="15" rx="3" fill="#38bdf8" opacity="0.8"/>

    <!-- Logs -->
    <g transform="translate(20, 160)">
        <text y="0" class="log-text">[ 2026-06-02 08:40:44 ] Weights optimized from commit activity.</text>
        <text y="15" class="log-text">[ 2026-06-02 08:40:44 ] Backpropagation complete for 12 Pull Requests.</text>
        <text y="30" class="log-text">[ 2026-06-02 08:40:44 ] Model status: <tspan fill="#22c55e">STABLE</tspan></text>
        <rect x="180" y="22" width="6" height="10" class="cursor"/>
    </g>

    <!-- Decorative elements -->
    <circle cx="450" cy="25" r="5" fill="#22c55e">
        <animate attributeName="opacity" values="1;0.2;1" dur="2s" repeatCount="indefinite" />
    </circle>
</svg>