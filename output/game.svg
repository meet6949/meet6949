<svg viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg">

<!-- Background -->
<rect width="100%" height="100%" fill="#0d1117"/>

<!-- Stars -->
<g fill="white">
  <circle cx="50" cy="20" r="1"/>
  <circle cx="200" cy="60" r="1"/>
  <circle cx="400" cy="30" r="1"/>
  <circle cx="700" cy="50" r="1"/>
</g>

<!-- Contribution Blocks (fake but realistic) -->
<g>
  <rect x="100" y="100" width="10" height="10" fill="#22c55e"/>
  <rect x="120" y="100" width="10" height="10" fill="#22c55e"/>
  <rect x="140" y="100" width="10" height="10" fill="#22c55e"/>
  <rect x="160" y="100" width="10" height="10" fill="#22c55e"/>
</g>

<!-- Spaceship (UPGRADED DESIGN) -->
<g id="ship">
  <polygon points="0,10 25,0 50,10 25,20" fill="#00eaff"/>
  <polygon points="10,10 25,5 40,10 25,15" fill="#0ff"/>
  
  <animateTransform 
    attributeName="transform"
    type="translate"
    from="0 140"
    to="700 140"
    dur="5s"
    fill="freeze"/>
</g>

<!-- Laser Bullets -->
<g stroke="#ff3b3b" stroke-width="2">
  <line x1="700" y1="150" x2="850" y2="150">
    <animate attributeName="x2" from="700" to="900" dur="0.3s" begin="5s" repeatCount="4"/>
  </line>
</g>

<!-- Explosion -->
<g>
  <circle cx="820" cy="150" r="5" fill="orange">
    <animate attributeName="r" from="5" to="35" dur="0.4s" begin="5.2s"/>
    <animate attributeName="opacity" from="1" to="0" dur="0.4s" begin="5.2s"/>
  </circle>
</g>

</svg>
