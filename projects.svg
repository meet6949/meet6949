    <text x="640" y="440" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="12" fill="#5a3a3a">4 projects indexed · scanning for more...</text>
    <rect x="1.5" y="1.5" width="1277" height="457" rx="22" fill="none" stroke="#3f1d1d" stroke-width="1.5"/>
