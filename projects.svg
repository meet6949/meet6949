    <circle cx="1180" cy="40" r="220" fill="url(#glow)" filter="url(#softBlur)"/>
    <circle cx="60" cy="440" r="220" fill="url(#glow)" filter="url(#softBlur)"/>

    <!-- header -->
    <text x="48" y="52" font-family="'JetBrains Mono',monospace" font-size="15" fill="#fca5a5">meet@datalab:~$<tspan fill="#f2e8e8"> ls ./projects</tspan></text>
    <rect x="46" y="64" width="1188" height="1" fill="#3f1d1d"/>

    <!-- card template: x, y, w=278, h=300 -->
