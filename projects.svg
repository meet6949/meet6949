<svg viewBox="0 0 1280 460" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0505"/>
      <stop offset="55%" stop-color="#150a0a"/>
      <stop offset="100%" stop-color="#0d0707"/>
    </linearGradient>
    <linearGradient id="cardTop" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#f87171"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#dc2626" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#dc2626" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M 36 0 L 0 0 0 36" fill="none" stroke="#3a1c1c" stroke-width="1" opacity="0.3"/>
    </pattern>
    <filter id="softBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
    <clipPath id="frameClip">
      <rect x="0" y="0" width="1280" height="460" rx="22"/>
    </clipPath>
  </defs>

  <g clip-path="url(#frameClip)">
